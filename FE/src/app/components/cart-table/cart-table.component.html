<div class="cart-table-wrapper">
    <div class="header-wrapper">
        <span class="header">Products in cart:</span>
        <p-button
            class="checkout-btn"
            label="Checkout"
            icon="pi pi-arrow-down"
            iconPos="right"
            size="small"
            (onClick)="scrollToCheckout()"
        />
    </div>
    <div class="table-wrapper">
        <p-table [value]="products" styleClass="cart-products-table">
            <ng-template #header>
                <tr class="cart-table-header">
                    <th class="col-product" colspan="2">Product</th>
                    <th class="col-qty">Quantity</th>
                    <th class="col-total">Total</th>
                </tr>
            </ng-template>
            <ng-template #body let-product>
                <tr class="table-row">
                    <td class="col-image product-img-link" (click)="navigateToProduct(product.productId)">
                        <img [src]="product.imageUrl" [alt]="product.name" (error)="onImageError($event)" />
                    </td>
                    <td class="col-product">
                        <span class="product-name">{{ product.name }}</span>
                        <div class="product-meta">
                            <span class="product-unit-price">${{ product.price }} each</span>
                            <p-tag [value]="product.inventoryStatus" [severity]="product.severityStatus" />
                        </div>
                    </td>
                    <td class="col-qty">
                        <div class="qty-stepper">
                            <button class="qty-btn" (click)="handleAction(product.productId, product.quantity, 'decrement')">
                                <i class="pi pi-minus"></i>
                            </button>
                            <span class="qty-value">{{ product.quantity }}</span>
                            <button class="qty-btn"
                                [disabled]="product.quantity >= product.stock"
                                (click)="handleAction(product.productId, product.quantity, 'increment')">
                                <i class="pi pi-plus"></i>
                            </button>
                        </div>
                    </td>
                    <td class="col-total">${{ (product.price * product.quantity).toFixed(2) }}</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
    <div class="footer-wrapper">
        <span class="footer">Products price:</span>
        <span class="footer">{{ "$" + cartTotalPrice }}</span>
    </div>
</div>

<div class="card flex justify-center gap-2">
    <p-confirmdialog />
</div>
