<div class="filter-panel">

    <!-- Scrollable filter content -->
    <div class="filter-scrollable">

        <div class="panel-header">
            <span class="panel-title">Filters</span>
            @if (activeFilterCount > 0) {
                <span class="active-badge">{{ activeFilterCount }}</span>
            }
        </div>

        <div class="filter-section">
            <div class="section-label">Sort by</div>
            <div class="sort-pills">
                @for (opt of sortOptions; track opt.value) {
                    <button
                        class="sort-pill"
                        [class.active]="sortBy === opt.value"
                        (click)="onSortSelect(opt.value)">
                        {{ opt.label }}
                    </button>
                }
            </div>
        </div>

        <div class="filter-section">
            <div class="section-label">Category</div>
            <div class="category-list">
                @for (cat of productCategories(); track cat.id) {
                    <div
                        class="category-item"
                        [class.selected]="isCategorySelected(cat.id)"
                        (click)="toggleCategory(cat.id)">
                        <span class="check-box">
                            <i class="pi pi-check"></i>
                        </span>
                        <span class="cat-label">{{ cat.categoryName }}</span>
                    </div>
                }
            </div>
        </div>

    </div>

    <!-- Pinned footer — always visible, never scrolls away -->
    @if (activeFilterCount > 0) {
        <div class="filter-footer">
            <button class="clear-all-btn" (click)="clearFilters()">
                <i class="pi pi-times-circle"></i>
                Clear all filters
            </button>
        </div>
    }

</div>
